# pve-microvm default image configuration
#
# This file configures which OCI image is fetched and cached as a
# ready-to-boot microvm template on the Proxmox node.
#
# The template is created as a PVE VM template that can be cloned
# instantly via `qm clone` to create new microvm guests.

[default]
# OCI image to use as the default microvm rootfs
image = debian:trixie-slim

# Template VM ID (must not conflict with existing VMs)
# Use a high number to avoid collisions
template_vmid = 9000

# Template name
template_name = microvm-trixie

# PVE storage for the template disk
storage = local-lvm

# Disk size
disk_size = 1G

# Memory (for the template definition; clones inherit this)
memory = 256

# Cores
cores = 1

# Network bridge
bridge = vmbr0

# Tags applied to the template and cloned VMs
tags = microvm,template

# Kernel path (shipped with the package)
kernel = /usr/share/pve-microvm/vmlinuz

# Kernel command line
append = console=ttyS0 root=/dev/vda rw quiet
