# pve-microvm defaults
#
# Default configuration values for microvm guests.
# These are applied when creating a new microvm via `qm create --machine microvm`.

# Recommended kernel args for serial console boot
# args: -kernel /usr/share/pve-microvm/vmlinuz -append "console=ttyS0 root=/dev/vda rw quiet"

# Typical microvm configuration:
# machine: microvm
# memory: 256
# cores: 1
# sockets: 1
# net0: virtio,bridge=vmbr0
# serial0: socket
# vga: none
# kvm: 1
