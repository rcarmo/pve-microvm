name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-kernel:
    name: Build microvm kernel
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential flex bison bc libelf-dev libssl-dev wget \
            cpio busybox-static

      - name: Cache kernel source
        uses: actions/cache@v5
        with:
          path: /tmp/pve-microvm-kernel-build/linux-*.tar.xz
          key: kernel-source-6.12.22

      - name: Build kernel
        run: |
          cd kernel
          ./build-kernel.sh --version 6.12.22 --output "$GITHUB_WORKSPACE/kernel/vmlinuz-microvm"
          ls -lh "$GITHUB_WORKSPACE/kernel/vmlinuz-microvm" "$GITHUB_WORKSPACE/kernel/initrd-microvm"
          file "$GITHUB_WORKSPACE/kernel/vmlinuz-microvm"

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v5
        with:
          name: kernel-artifacts
          path: |
            kernel/vmlinuz-microvm
            kernel/initrd-microvm
          retention-days: 90

  build-deb:
    name: Build Debian package
    runs-on: ubuntu-24.04
    needs: build-kernel
    steps:
      - uses: actions/checkout@v5

      - name: Download kernel artifact
        uses: actions/download-artifact@v5
        with:
          name: kernel-artifacts
          path: kernel/

      - name: Verify kernel
        run: |
          ls -lh kernel/vmlinuz-microvm
          file kernel/vmlinuz-microvm

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev debhelper fakeroot build-essential

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../pve-microvm_*.deb dist/
          ls -lh dist/

      - name: Inspect package contents
        run: |
          dpkg-deb -c dist/pve-microvm_*.deb
          echo "---"
          dpkg-deb -I dist/pve-microvm_*.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v5
        with:
          name: pve-microvm-deb
          path: dist/pve-microvm_*.deb
          retention-days: 90

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-kernel, build-deb]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Download kernel
        uses: actions/download-artifact@v5
        with:
          name: kernel-artifacts
          path: release/

      - name: Download .deb
        uses: actions/download-artifact@v5
        with:
          name: pve-microvm-deb
          path: release/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/vmlinuz-microvm
            release/initrd-microvm
            release/pve-microvm_*.deb
          body_path: RELEASE_NOTES.md
          draft: false

      - name: Publish .deb to GitHub Packages (OCI)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Install oras for OCI artifact push
          ORAS_VERSION="1.3.2"
          curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" oras
          chmod +x oras

          # Login to ghcr.io with the workflow GITHUB_TOKEN
          echo "${{ secrets.GITHUB_TOKEN }}" | ./oras login ghcr.io -u "${{ github.actor }}" --password-stdin

          # Push .deb as an OCI artifact
          cd release
          DEB=$(ls pve-microvm_*.deb)
          ../oras push "ghcr.io/${{ github.repository }}:${TAG}" \
            --artifact-type application/vnd.debian.binary-package \
            "${DEB}:application/vnd.debian.binary-package"

          echo "Published ${DEB} to ghcr.io/${{ github.repository }}:${TAG}"
